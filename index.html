<title>Emily Kant's Grand Prix 15 — Invitación</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C9A050;--gold-l:#EDD080;--gold-d:#7A5A10;
  --navy:#0A1628;--navy-mid:#0F1E38;--navy-light:#162444;
  --red:#CC0022;--silver:#B8C4D8;
}
html,body{height:100%;background:#06080F;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;overflow:hidden}

.card{
  width:min(390px,100vw);height:min(800px,100vh);
  background:
    radial-gradient(ellipse 75% 35% at 50% 0%, rgba(201,160,80,.08) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(10,22,40,.8) 0%, transparent 70%),
    linear-gradient(170deg, #141E32 0%, #0A1020 45%, #0E1828 100%);
  border-radius:28px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  padding:26px 22px 20px;
  border:1px solid rgba(201,160,80,.18);
  box-shadow:
    0 0 0 1px rgba(0,0,0,.9),
    0 40px 80px rgba(0,0,0,.85),
    0 0 60px rgba(10,22,40,.6),
    inset 0 1px 0 rgba(255,255,255,.05);
}

/* Textura diagonal */
.bg-tx{position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(-52deg,transparent 0,transparent 42px,rgba(201,160,80,.018) 42px,rgba(201,160,80,.018) 43px)}
/* Brillo central azul marino */
.bg-navy-glow{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(10,22,40,.35) 0%, transparent 70%)}

/* Damero esquinas */
.checker{position:absolute;width:44px;height:44px;opacity:.08;
  background-image:linear-gradient(45deg,#C9A050 25%,transparent 25%),linear-gradient(-45deg,#C9A050 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#C9A050 75%),linear-gradient(-45deg,transparent 75%,#C9A050 75%);
  background-size:8px 8px;background-position:0 0,0 4px,4px -4px,-4px 0}
.ctl{top:14px;left:14px}.ctr{top:14px;right:14px}

/* Línea decorativa superior azul+dorado */
.top-stripe{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, transparent 0%, var(--navy-light) 20%, var(--gold) 50%, var(--navy-light) 80%, transparent 100%);
}

/* HEADER */
.hdr{z-index:3;text-align:center;animation:sdn .7s cubic-bezier(.22,1,.36,1) both}
@keyframes sdn{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
.h-kicker{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:5px;color:var(--gold);opacity:.75;text-transform:uppercase;margin-bottom:5px}
.h-name{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:rgba(180,200,230,.5);letter-spacing:5px;text-transform:uppercase}
.h-gp{font-family:'Orbitron',sans-serif;font-size:29px;font-weight:900;color:#fff;line-height:1.05;
  text-shadow:0 0 30px rgba(201,160,80,.4),0 0 60px rgba(10,22,40,.8);margin-top:2px}
.h-gp span{color:var(--gold);font-size:37px}
.h-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:7px}
.hbl{height:1px;width:52px;background:linear-gradient(90deg,transparent,var(--gold))}
.hbr{height:1px;width:52px;background:linear-gradient(90deg,var(--gold),transparent)}
.hbd{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 8px var(--gold)}

/* CAR — fondo negro se funde con la tarjeta */
.car-zone{width:100%;height:198px;position:relative;z-index:3;overflow:hidden;margin:10px 0 2px}
.car-img{
  position:absolute;height:172px;top:50%;transform:translateY(-50%);
  filter:
    drop-shadow(0 6px 22px rgba(204,0,34,.5))
    drop-shadow(0 0 40px rgba(201,160,80,.25))
    brightness(1.06) contrast(1.05) saturate(1.1);
  animation:carSlide 3.0s cubic-bezier(.45,0,.55,1) infinite alternate;
}
/* Fondo negro del auto se mezcla con fondo oscuro de la tarjeta perfectamente */
@keyframes carSlide{0%{left:-10px}100%{left:calc(100% - 290px)}}

/* Llama exhaust */
.exhaust{position:absolute;top:50%;width:55px;height:22px;transform:translateY(-44%);pointer-events:none;
  animation:carSlide 3.0s cubic-bezier(.45,0,.55,1) infinite alternate,efx .11s ease infinite;margin-left:-55px}
@keyframes efx{0%,100%{opacity:1;transform:translateY(-44%) scaleX(1)}50%{opacity:.5;transform:translateY(-48%) scaleX(.62)}}

/* Líneas de velocidad */
.spl{position:absolute;height:1px;
  background:linear-gradient(90deg,rgba(201,160,80,.45),rgba(10,22,40,.1));
  animation:spln var(--d) linear var(--dl) infinite;top:var(--t);right:0;width:var(--w)}
@keyframes spln{0%{right:-10%;opacity:1}100%{right:110%;opacity:0}}

/* SOBRE REALISTA */
.env-zone{z-index:3;width:100%;display:flex;flex-direction:column;align-items:center;margin:4px 0 4px}
.envelope{
  width:300px;height:176px;position:relative;cursor:pointer;
  filter:drop-shadow(0 10px 32px rgba(0,0,0,.65)) drop-shadow(0 0 18px rgba(201,160,80,.18));
  animation:epulse 2.8s ease-in-out infinite;transition:transform .15s;
}
.envelope:active{transform:scale(.97)}
@keyframes epulse{
  0%,100%{filter:drop-shadow(0 10px 32px rgba(0,0,0,.65)) drop-shadow(0 0 18px rgba(201,160,80,.18))}
  50%{filter:drop-shadow(0 14px 42px rgba(0,0,0,.7)) drop-shadow(0 0 32px rgba(201,160,80,.52))}
}
.env-body{
  position:absolute;inset:0;border-radius:6px;
  background:linear-gradient(155deg,#E2D5B0 0%,#CEBA8A 45%,#B09050 100%);
  box-shadow:inset 0 2px 6px rgba(255,255,255,.28),inset 0 -2px 6px rgba(0,0,0,.22);
}
.env-body::before{
  content:'';position:absolute;inset:0;border-radius:6px;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px),
             repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px);
}
.env-border{position:absolute;inset:3px;border-radius:5px;border:1px solid rgba(201,160,80,.55);pointer-events:none}
/* Solapa superior */
.env-flap-top{
  position:absolute;top:0;left:0;right:0;
  width:0;height:0;border-style:solid;
  border-width:82px 150px 0 150px;
  border-color:rgba(168,138,72,.72) transparent transparent transparent;
  filter:drop-shadow(0 3px 4px rgba(0,0,0,.18));
}
.env-flap-top::after{
  content:'';position:absolute;top:-82px;left:-148px;right:-148px;height:80px;
  background:linear-gradient(158deg,#DDD0A0,#C0A060);
  clip-path:polygon(50% 100%,0% 0%,100% 0%);
}
/* Solapa inferior */
.env-flap-bottom{
  position:absolute;bottom:0;left:0;right:0;
  width:0;height:0;border-style:solid;
  border-width:0 150px 72px 150px;
  border-color:transparent transparent rgba(148,118,58,.58) transparent;
}
/* Solapas laterales */
.env-flap-left{
  position:absolute;top:0;left:0;bottom:0;
  width:0;height:0;border-style:solid;
  border-width:88px 0 88px 115px;
  border-color:transparent transparent transparent rgba(158,128,62,.42);
}
.env-flap-right{
  position:absolute;top:0;right:0;bottom:0;
  width:0;height:0;border-style:solid;
  border-width:88px 115px 88px 0;
  border-color:transparent rgba(145,115,52,.42) transparent transparent;
}
/* Sello de cera */
.env-seal{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-42%);
  width:54px;height:54px;border-radius:50%;z-index:5;
  background:radial-gradient(circle at 32% 28%,#F2D878,#C9A050 42%,#8B6010 75%,#5C3800);
  box-shadow:0 4px 14px rgba(0,0,0,.55),inset 0 1px 3px rgba(255,255,255,.35);
  display:flex;align-items:center;justify-content:center;
  animation:sealP 2.8s ease-in-out infinite;
}
@keyframes sealP{0%,100%{box-shadow:0 4px 14px rgba(0,0,0,.55),0 0 0 0 rgba(201,160,80,.45)}50%{box-shadow:0 4px 14px rgba(0,0,0,.55),0 0 0 9px rgba(201,160,80,0)}}
.env-seal span{font-family:Georgia,serif;font-size:16px;font-weight:bold;color:#4A2800;letter-spacing:1px}
/* Texto "Abre el sobre" — posicionado debajo del sello para verse completo */
.env-label{
  position:absolute;
  bottom:18px;          /* anclado al fondo del sobre, siempre visible */
  left:0;right:0;
  text-align:center;
  font-family:'Playfair Display',serif;font-style:italic;font-size:20px;
  color:rgba(80,50,5,.72);
  text-shadow:0 1px 3px rgba(255,255,255,.35);
  pointer-events:none;z-index:4;
}
.tap-hint{font-size:9px;letter-spacing:3px;color:rgba(180,200,230,.4);text-transform:uppercase;margin-top:5px;animation:thb 2s ease infinite}
@keyframes thb{0%,100%{opacity:.45}50%{opacity:.12}}

/* COUNTDOWN */
.cd-section{z-index:3;width:100%;margin-top:8px}
.cd-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:4px;color:var(--gold);text-align:center;margin-bottom:10px;opacity:.7;text-transform:uppercase}
.cd-row{display:flex;justify-content:center;align-items:center;gap:4px}
.cd-unit{display:flex;flex-direction:column;align-items:center}
.cd-box{
  width:70px;height:68px;
  background:linear-gradient(160deg,#111D30,#0A1428);
  border:1px solid rgba(201,160,80,.3);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:30px;font-weight:900;color:#fff;
  text-shadow:0 0 18px rgba(201,160,80,.75);
  box-shadow:inset 0 2px 5px rgba(0,0,0,.6),0 0 14px rgba(10,22,40,.4);
  position:relative;overflow:hidden;
}
.cd-box::after{content:'';position:absolute;top:48%;left:8%;right:8%;height:1px;background:rgba(201,160,80,.14)}
.cd-name{font-size:8px;letter-spacing:1.5px;color:var(--silver);margin-top:4px;text-transform:uppercase;opacity:.5}
.cd-sep{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:var(--gold);margin-bottom:16px;opacity:.55;animation:sb 1s step-end infinite}
@keyframes sb{0%,100%{opacity:.55}50%{opacity:.08}}

/* FOOTER */
.f1-footer{z-index:3;display:flex;align-items:center;gap:10px;margin-top:14px;opacity:.68}
.fl{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.fr{width:48px;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}

/* Partículas */
.pt{position:absolute;border-radius:50%;width:2px;height:2px;background:var(--gold);pointer-events:none;
  animation:ptf var(--pd) ease-in var(--pde) infinite;left:var(--px);top:100%}
@keyframes ptf{0%{transform:translateY(0) translateX(0) scale(1);opacity:.7}100%{transform:translateY(-850px) translateX(var(--pdx)) scale(0);opacity:0}}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;z-index:9999;background:#06080F;align-items:center;justify-content:center;flex-direction:column;gap:18px}
.overlay.on{display:flex;animation:ov .4s ease both}
@keyframes ov{from{opacity:0}to{opacity:1}}
.ov-flash{position:absolute;inset:0;background:radial-gradient(ellipse at center,#C9A050 0%,#0A1628 40%,#06080F 75%);opacity:0;animation:flash .65s ease .08s both}
@keyframes flash{0%{opacity:0;transform:scale(.4)}40%{opacity:1;transform:scale(1.15)}100%{opacity:0;transform:scale(1)}}
.ov-text{z-index:1;text-align:center;font-family:'Orbitron',sans-serif;color:#fff;font-size:15px;letter-spacing:3px;text-transform:uppercase;animation:os .5s .4s both ease}
@keyframes os{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.ov-sub{font-size:10px;letter-spacing:2px;color:var(--gold);margin-top:6px;opacity:.8}
.ov-bar{width:200px;height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;z-index:1}
.ov-prog{height:100%;background:linear-gradient(90deg,var(--navy-light),var(--gold));animation:prg 1.9s .5s ease both;width:0}
@keyframes prg{to{width:100%}}
</style>
</head>

      <div class="cd-unit"><div class="cd-box" id="cdS">00</div><div class="cd-name">Segundos</div></div>
    </div>
  </div>

  <div class="f1-footer">
    <div class="fl"></div>
    <svg width="52" height="22" viewBox="0 0 52 22"><rect width="52" height="22" rx="4" fill="#E8002D"/>
    <text x="26" y="16" font-family="Arial Black,sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle">F1</text></svg>
    <div class="fr"></div>
  </div>
</div>

<div class="overlay" id="ovl">
  <div class="ov-flash"></div>
  <div class="ov-text">🏎️ &nbsp;Grand Prix de Emily Kant<div class="ov-sub">Cargando tu invitación…</div></div>
  <div class="ov-bar"><div class="ov-prog"></div></div>
</div>

<script>
const EVT=new Date('2026-06-06T20:00:00-05:00');
function tick(){
  const d=EVT-Date.now();
  if(d<=0){['cdD','cdH','cdM','cdS'].forEach(id=>document.getElementById(id).textContent='00');return;}
  document.getElementById('cdD').textContent=String(Math.floor(d/86400000)).padStart(2,'0');
  document.getElementById('cdH').textContent=String(Math.floor(d%86400000/3600000)).padStart(2,'0');
  document.getElementById('cdM').textContent=String(Math.floor(d%3600000/60000)).padStart(2,'0');
  document.getElementById('cdS').textContent=String(Math.floor(d%60000/1000)).padStart(2,'0');
}
tick();setInterval(tick,1000);

const eng=document.getElementById('eng');
let audioOn=false;
function startAudio(){
  if(audioOn)return;
  const playPromise = eng.play();
  if(playPromise!==undefined){
    playPromise.then(()=>{
      audioOn=true;
      // Fade in gradual del motor
      eng.volume=0;
      let vol=0;
      const fade=setInterval(()=>{
        vol=Math.min(vol+0.04, 0.42);
        eng.volume=vol;
        if(vol>=0.42) clearInterval(fade);
      },80);
    }).catch(e=>{
      // Navegador bloqueó autoplay — esperar interacción
      console.log('Autoplay blocked, waiting for interaction');
    });
  }
}
// Autoplay al cargar — varios intentos para cubrir restricciones de navegadores
document.addEventListener('DOMContentLoaded', function() {
  // Intento inmediato
  startAudio();
  // Reintento con delay por si el navegador bloquea
  setTimeout(startAudio, 500);
  setTimeout(startAudio, 1500);
});
// Fallback: si los anteriores fallan, primer toque lo activa
document.addEventListener('click', startAudio, {once:true});
document.addEventListener('touchstart', startAudio, {once:true});

const pc=document.getElementById('pts');
for(let i=0;i<16;i++){
  const p=document.createElement('div');p.className='pt';
  p.style.setProperty('--px',Math.random()*100+'%');
  p.style.setProperty('--pd',(3.5+Math.random()*5)+'s');
  p.style.setProperty('--pde',(Math.random()*7)+'s');
  p.style.setProperty('--pdx',(Math.random()*120-60)+'px');
  pc.appendChild(p);
}

function openEnv(){
  startAudio();
  document.getElementById('ovl').classList.add('on');
  setTimeout(()=>window.location.href='tarjeta.html',2200);
}
</script>
</body>
</html>
